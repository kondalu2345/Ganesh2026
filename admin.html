<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-warning">

<div class="container">

<a class="navbar-brand fw-bold"
href="index.html">

🙏 Sri Vinayaka Ganesh Utsav 2026

</a>

</div>

</nav>

<div class="container">

<!-- LOGIN -->

<div class="login-box" id="loginSection">

<h3 class="mb-3">

Admin Login

</h3>

<input
type="text"
id="username"
class="form-control"
placeholder="Username">

<input
type="password"
id="password"
class="form-control"
placeholder="Password">

<button
class="btn btn-orange w-100"
onclick="login()">

Login

</button>

</div>

<!-- ADMIN PANEL -->

<div
id="adminSection"
style="display:none;">

<h2 class="mt-4">

Admin Dashboard

</h2>

<hr>

<h4>Add Contribution</h4>

<input id="cDate"
class="form-control"
placeholder="Date">

<input id="cName"
class="form-control"
placeholder="Contributor Name">

<input id="cAmount"
class="form-control"
placeholder="Amount">

<input id="cMode"
class="form-control"
placeholder="Cash / UPI">

<button
class="btn btn-success"
onclick="addContribution()">

Save Contribution

</button>

<hr>

<h4>Add Expense</h4>

<input id="eDate"
class="form-control"
placeholder="Date">

<input id="eDesc"
class="form-control"
placeholder="Description">

<input id="eAmount"
class="form-control"
placeholder="Amount">

<button
class="btn btn-success"
onclick="addExpense()">

Save Expense

</button>

<hr>

<h4>Add Notification</h4>

<input id="nTitle"
class="form-control"
placeholder="Title">

<textarea
id="nMessage"
class="form-control"
placeholder="Message"></textarea>

<button
class="btn btn-success"
onclick="addNotification()">

Save Notification

</button>

<hr>

<h4>Add Gallery Image</h4>

<input id="gUrl"
class="form-control"
placeholder="Google Drive Image URL">

<input id="gCaption"
class="form-control"
placeholder="Caption">

<button
class="btn btn-success"
onclick="addGallery()">

Save Image

</button>

</div>

</div>

<footer class="bg-warning text-center p-3 mt-5">

Ganapathi Bappa Morya 🙏

</footer>

<script src="js/config.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
